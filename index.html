<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome — Atul</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;line-height:1.4;color:#222}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f6ff,#fff)}
    .card{background:white;padding:2rem;border-radius:12px;box-shadow:0 6px 24px rgba(15,23,42,0.08);max-width:520px;width:90%;text-align:center}
    h1{margin:0 0 .5rem;font-size:1.6rem}
    p{margin:.25rem 0;color:#444}
    .meta{margin-top:1rem;font-size:0.9rem;color:#666}
    button{margin-top:1rem;padding:.5rem .85rem;border:0;border-radius:8px;background:#0366d6;color:white;font-weight:600;cursor:pointer}
    button:active{transform:translateY(1px)}
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Welcome, Atul!</h1>
    <p>This is a simple welcome homepage.</p>
    <p class="meta" id="time">Loading time…</p>
    <button id="greetBtn" type="button" aria-live="polite">Say Hello</button>
  </main>

  <script>
    // show current date/time
    const timeEl = document.getElementById('time');
    function updateTime(){ timeEl.textContent = new Date().toLocaleString(); }
    updateTime();
    setInterval(updateTime, 1000);

    // small interactive greeting
    document.getElementById('greetBtn').addEventListener('click', () => {
      alert('Hello, Atul! Welcome to your page.');
    });
  </script>
</body>
</html>
